<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skitter — мышь против кота</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- Кнопка вызова меню -->
    <div class="menu-btn" id="menuBtn">📋</div>
    
    <!-- Меню (скрыто по умолчанию) -->
    <div class="menu-panel" id="menuPanel">
        <div class="menu-header">
            <span>📋 ИНФОРМАЦИЯ</span>
            <span class="close-btn" id="closeMenuBtn">✖</span>
        </div>
        <div class="menu-section">
            <h3>📊 ХАРАКТЕРИСТИКИ</h3>
            <p>🐭 Мышь: <span id="menuMouseSpeed">0</span> px/сек</p>
            <p>🐱 Кот: <span id="menuCatSpeed">0</span> px/сек</p>
            <p>🐕 Собака: <span id="menuDogFullness">0</span> сытость</p>
        </div>
        <div class="menu-section">
            <h3>🎯 ЗАДАНИЯ</h3>
            <div id="menuQuests"></div>
        </div>
        <div class="menu-section">
            <h3>🎒 ИНВЕНТАРЬ</h3>
            <p>🧀 Сыр: <span id="menuCheese">0</span></p>
            <p>🦴 Кости: <span id="menuBones">0</span></p>
            <p>📦 Сундуки: <span id="menuChests">0</span></p>
        </div>
        <div class="menu-section">
            <h3>🏆 ДОСТИЖЕНИЯ</h3>
            <div id="menuAchievements"></div>
        </div>
        <div class="menu-footer">
            <span>🔄 Новая игра</span>
            <span>⏸ Пауза</span>
        </div>
    </div>
    
    <script type="module" src="game.js"></script>
</body>
</html>
